services:
  ecohome:
    build: .
    ports:
      - "8501:8501"
    environment:
      - SERVICE_MODE=streamlit
      - PORT=8501
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-ecohome-energy-advisor}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT:-}
      - ENERGY_ADVISOR_BOOTSTRAP_VECTORSTORE=${ENERGY_ADVISOR_BOOTSTRAP_VECTORSTORE:-false}
    volumes:
      - ecohome_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ecohome_data:
    driver: local
