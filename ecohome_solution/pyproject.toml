[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["energy_advisor"]
omit = [
    # Bootstrap scripts — run once, not unit-testable without a live DB setup
    "energy_advisor/bootstrap/*",
    # Evaluation pipeline — requires live LLM API calls
    "energy_advisor/evaluation/*",
    # Agent graph — requires full LangGraph + LLM invocation
    "energy_advisor/agent.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 70
